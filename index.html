<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coloorfly Studio | Generador Cromático</title>
</head>

<body>

  <header>
    <h1> <i>Coloorfly Studio — Tu laboratorio de color.</i> </h1>
    <p>Tamaño elegido, paleta generada: ¡así de rápido!</p>
  </header>

  <section class="controles">
    <label for="tamano">Composición:</label>
    <select id="tamano">
      <option value="6">6 colores</option>
      <option value="8">8 colores</option>
      <option value="9">9 colores</option>
    </select>
    <button id="btnGenerar">¡Generar!</button>
  </section>

  <main>
    <div id="paleta">
      <p id="mensajeInicial">Dale a 'Generar' y que empiece la magia.</p>
    </div>
  </main>

  <footer>
    <p> <i>Un experimento de color por Felix Figueroa.</i> </p>
  </footer>
</body>

</html>
